</section>

<div>
    <h2>Write a Review</h2>

    <form action="#" method="get">
        <label for="reviewerName">Name:</label><br>
        <input type="text" id="reviewerName" name="reviewerName" required><br><br>

        <label for="reviewText">Your Review:</label><br>
        <textarea id="reviewText" name="reviewText" rows="5" cols="40" required></textarea><br><br>

        <button type="submit">Submit Review</button>
        <button type="reset">Clear</button>
    </form>
</div>

<section class="reviews">
    <h2>Customer Reviews</h2>
</section>

<script>

const cartButtons = document.querySelectorAll("#addToCart");

cartButtons.forEach((btn, index) => {
    btn.addEventListener("click", () => {

        fetch("https://fakestoreapi.com/carts", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                userId: 1,
                date: new Date(),
                products: [{
                    productId: index + 1,
                    quantity: 1
                }]
            })
        })
        .then(res => res.json())
        .then(data => {
            alert("Product added to cart!");
            console.log(data);
        })
        .catch(err => console.error(err));

    });
});



const form = document.querySelector("form");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("reviewerName").value;
    const review = document.getElementById("reviewText").value;

    fetch("https://jsonplaceholder.typicode.com/posts", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: name,
            review: review
        })
    })
    .then(res => res.json())
    .then(data => {

        alert("Review Submitted!");

        const reviewSection = document.querySelector(".reviews");

        const newReview = document.createElement("article");
        newReview.classList.add("review");

        newReview.innerHTML = `
            <h3>${name}</h3>
            <p>"${review}"</p>
        `;

        reviewSection.appendChild(newReview);

        form.reset();
    })
    .catch(err => console.error(err));
});

</script>
